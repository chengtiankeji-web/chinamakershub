name = "cmh-inquiry-api"
main = "src/index.js"
compatibility_date = "2026-04-01"

# 自定义路由 - 部署后绑定到 chinamakershub.com
[[routes]]
pattern = "chinamakershub.com/api/*"
zone_name = "chinamakershub.com"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "cmh-inquiries"
database_id = "ac0f0173-f3d9-42d3-bb41-511fc636ef3d"
# 创建命令: wrangler d1 create cmh-inquiries
# 创建后把返回的 database_id 填到上面

# 环境变量
[vars]
ENVIRONMENT = "production"

# 敏感变量用 wrangler secret 设置:
# wrangler secret put ADMIN_TOKEN
# (用于管理 API 鉴权)

# 可选: 邮件服务集成
# [[send_email]]
# name = "EMAIL_SENDER"
# destination_address = "info@chinamakershub.com"
